  <title>Sligro Bezoekverslag</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    body{background:#F0FAF3;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
    input,textarea,button{font-family:inherit}
    @keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.4),0 0 0 6px rgba(192,57,43,0.1)}50%{box-shadow:0 0 0 12px rgba(192,57,43,0.2),0 0 0 24px rgba(192,57,43,0.05)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes speaking{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
    .card{background:#fff;border:1px solid #C8E5CC;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(61,170,92,0.06);animation:fadeIn 0.35s ease}
    .label{color:#3DAA5C;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:block}
    .btn-primary{padding:15px 20px;border-radius:12px;width:100%;border:none;background:linear-gradient(135deg,#3DAA5C,#2D8045);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(61,170,92,0.3);touch-action:manipulation;display:block}
    .btn-primary:disabled{background:#D4EFD9;color:#A8C8AC;box-shadow:none;cursor:default}
    .btn-secondary{padding:13px 20px;border-radius:12px;width:100%;background:#fff;border:1.5px solid #C8E5CC;color:#2E4A35;font-size:15px;font-weight:600;cursor:pointer;touch-action:manipulation;display:block}
    .input-field{width:100%;padding:12px 14px;background:#fff;border:1.5px solid #C8E5CC;border-radius:10px;color:#1C2B20;font-size:16px;outline:none;-webkit-appearance:none}
    .textarea-field{width:100%;padding:12px 14px;background:#fff;border:1.5px solid #C8E5CC;border-radius:10px;color:#1C2B20;font-size:15px;outline:none;-webkit-appearance:none;resize:vertical;line-height:1.6}
    .mic-btn{width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;font-size:34px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;transition:all 0.25s}
    .mic-btn.idle{background:linear-gradient(135deg,#3DAA5C,#2D8045);box-shadow:0 0 0 6px #D4EFD9,0 6px 24px rgba(61,170,92,0.25)}
    .mic-btn.recording{background:linear-gradient(135deg,#C0392B,#922b21);box-shadow:0 0 0 8px rgba(192,57,43,0.15),0 6px 24px rgba(192,57,43,0.3);animation:mic-pulse 1.8s ease-in-out infinite}
    .mic-btn.speaking-state{background:linear-gradient(135deg,#2980b9,#1a5276);box-shadow:0 0 0 6px rgba(41,128,185,0.15),0 6px 24px rgba(41,128,185,0.25);cursor:default}
    .rec-dot{width:9px;height:9px;border-radius:50%;background:#C0392B;animation:blink 1s ease-in-out infinite}
    .hidden{display:none!important}
    .live-text{background:#F0FAF3;border:1.5px solid #C8E5CC;border-radius:10px;padding:12px 14px;min-height:50px;font-size:15px;color:#1C2B20;line-height:1.6;margin-top:14px;width:100%;word-break:break-word}
    .badge-deadline{background:#D4EFD9;color:#1F5C30;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
    .progress-bar{height:4px;background:#D4EFD9;border-radius:2px;margin-bottom:28px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#3DAA5C,#2D8045);border-radius:2px;transition:width 0.4s ease}
    .vraag-bubble{background:#E3F5E9;border-radius:16px;padding:18px 20px;margin-bottom:24px;position:relative;text-align:center}
    .vraag-bubble::after{content:"";position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid #E3F5E9}
    .wave-bars{display:flex;align-items:center;gap:3px;height:24px}
    .wave-bar{width:4px;border-radius:2px;background:#2980b9}
    .wave-bar:nth-child(1){animation:speaking 0.6s ease-in-out infinite}
    .wave-bar:nth-child(2){animation:speaking 0.6s ease-in-out 0.1s infinite}
    .wave-bar:nth-child(3){animation:speaking 0.6s ease-in-out 0.2s infinite}
    .wave-bar:nth-child(4){animation:speaking 0.6s ease-in-out 0.15s infinite}
    .wave-bar:nth-child(5){animation:speaking 0.6s ease-in-out 0.05s infinite}
    .answer-card{background:#fff;border:1.5px solid #3DAA5C;border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .score-display{font-size:48px;font-weight:800;color:#3DAA5C;text-align:center;margin:8px 0}

<script>
const FIXED_EMAIL = "svanreijmersdal@sligro.nl";

// ── Vragen definitie ─────────────────────────────────────────────
const VRAGEN = [
  {
    id: "nummer",
    vraag: "Wat is het klantnummer?",
    hint: "Spreek alleen het klantnummer in",
    icon: "🔢"
  },
  {
    id: "naam",
    vraag: "Wat is de naam van de klant?",
    hint: "Spreek de volledige bedrijfsnaam in",
    icon: "🏢"
  },
  {
    id: "samenvatting",
    vraag: "Geef een korte samenvatting van je bezoek.",
    hint: "Wat was de aanleiding en hoe verliep het gesprek?",
    icon: "💬"
  },
  {
    id: "afspraken",
    vraag: "Welke afspraken heb je gemaakt met de klant?",
    hint: "Noem alle concrete afspraken en acties",
    icon: "🤝"
  },
  {
    id: "score",
    vraag: "Hoe tevreden is de klant? Geef een cijfer van 1 tot 10.",
    hint: "Spreek alleen het cijfer in, bijvoorbeeld: zeven",
    icon: "⭐"
  }
];

// ── State ────────────────────────────────────────────────────────
let S = {
  vraagIdx: 0,
  antwoorden: {},   // id -> antwoord string
  datum: new Date().toISOString().split("T")[0]
};

let recognition = null;
let isListening = false;
let isSpeaking = false;
let fullTranscript = "";
let timerInterval = null;
let timerSecs = 0;
let currentVraagId = null;

// ── Helpers ──────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function showError(m){ $("error-text").textContent=m; $("error-banner").classList.remove("hidden"); }
function hideError(){ $("error-banner").classList.add("hidden"); }

function renderStepBar(current){
  const bar = $("stepbar");
  bar.innerHTML = "";
  VRAGEN.forEach((v, i) => {
    const wrap = document.createElement("div");
    wrap.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0";
    const done = i < current;
    const active = i === current;
    wrap.innerHTML = `
      <div style="width:32px;height:32px;border-radius:50%;flex-shrink:0;
        background:${done?"#3DAA5C":active?"#fff":"#E3F5E9"};
        border:2.5px solid ${done||active?"#3DAA5C":"#C8E5CC"};
        box-shadow:${active?"0 0 0 4px #D4EFD9":"none"};
        display:flex;align-items:center;justify-content:center;
        font-size:${done?12:15}px;transition:all 0.3s">
        ${done?"✓":"<span>"+v.icon+"</span>"}
      </div>
      <span style="font-size:8px;font-weight:${active?700:500};
        color:${active?"#3DAA5C":"#A8C8AC"};
        letter-spacing:0.3px;white-space:nowrap;max-width:52px;
        text-align:center;overflow:hidden;text-overflow:ellipsis">
        ${v.id === "nummer" ? "NR." : v.id === "naam" ? "NAAM" : v.id === "samenvatting" ? "VERSLAG" : v.id === "afspraken" ? "AFSPRAKEN" : "SCORE"}
      </span>`;
    bar.appendChild(wrap);
    if(i < VRAGEN.length - 1){
      const line = document.createElement("div");
      line.style.cssText = `flex:1;height:2.5px;background:${done?"#3DAA5C":"#C8E5CC"};margin:0 4px;margin-bottom:18px;border-radius:2px;min-width:8px`;
      bar.appendChild(line);
    }
  });
}

function updateProgress(){
  const pct = (S.vraagIdx / VRAGEN.length) * 100;
  $("progress-fill").style.width = pct + "%";
  renderStepBar(S.vraagIdx);
}

// ── Text-to-Speech ────────────────────────────────────────────────
function spreekVraag(tekst, callback){
  if(!window.speechSynthesis){ callback && callback(); return; }
  window.speechSynthesis.cancel();

  const utt = new SpeechSynthesisUtterance(tekst);
  utt.lang = "nl-NL";
  utt.rate = 0.95;
  utt.pitch = 1;

  // Kies Nederlandse stem als beschikbaar
  const stemmen = window.speechSynthesis.getVoices();
  const nlStem = stemmen.find(v => v.lang.startsWith("nl"));
  if(nlStem) utt.voice = nlStem;

  isSpeaking = true;
  $("mic-btn").className = "mic-btn speaking-state";
  $("mic-btn").textContent = "🔊";
  $("mic-hint").textContent = "Luister naar de vraag...";
  $("speaking-indicator").classList.remove("hidden");
  $("timer-row").classList.add("hidden");
  $("live-tekst").classList.add("hidden");

  utt.onend = function(){
    isSpeaking = false;
    $("speaking-indicator").classList.add("hidden");
    $("mic-btn").className = "mic-btn idle";
    $("mic-btn").textContent = "🎙️";
    $("mic-hint").textContent = "🎙 Tik om te antwoorden";
    callback && callback();
  };

  utt.onerror = function(){
    isSpeaking = false;
    $("speaking-indicator").classList.add("hidden");
    $("mic-btn").className = "mic-btn idle";
    $("mic-btn").textContent = "🎙️";
    $("mic-hint").textContent = "🎙 Tik om te antwoorden";
    callback && callback();
  };

  // Safari laadt stemmen asynchroon
  if(stemmen.length === 0){
    window.speechSynthesis.onvoiceschanged = function(){
      const nl = window.speechSynthesis.getVoices().find(v=>v.lang.startsWith("nl"));
      if(nl) utt.voice = nl;
      window.speechSynthesis.speak(utt);
    };
  } else {
    window.speechSynthesis.speak(utt);
  }
}

// ── Interview flow ────────────────────────────────────────────────
function toonVraag(idx){
  if(idx >= VRAGEN.length){ toonVerslag(); return; }

  const v = VRAGEN[idx];
  currentVraagId = v.id;
  S.vraagIdx = idx;
  updateProgress();

  // Reset UI
  $("review-card").classList.add("hidden");
  $("live-tekst").classList.add("hidden");
  $("live-tekst").innerHTML = "";
  $("timer-row").classList.add("hidden");
  fullTranscript = "";
  isListening = false;

  // Toon vraag tekst
  $("vraag-tekst").textContent = v.vraag;
  $("vraag-hint").textContent = v.hint;
  $("mic-hint").textContent = "Wacht even...";

  // Spreek de vraag uit, daarna kan gebruiker antwoorden
  spreekVraag(v.vraag);
}

function onMicTap(){
  if(isSpeaking) return; // wacht tot vraag klaar is
  if(isListening){ stopLuisteren(); return; }
  startLuisteren();
}

// ── Speech Recognition ────────────────────────────────────────────
function startLuisteren(){
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    showError("Spraakherkenning niet beschikbaar. Gebruik Safari op iPhone.");
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "nl-NL";
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  fullTranscript = "";
  isListening = true;

  $("mic-btn").className = "mic-btn recording";
  $("mic-btn").textContent = "⏹️";
  $("mic-hint").textContent = "⏹ Tik om te stoppen";
  $("timer-row").classList.remove("hidden");
  $("live-tekst").classList.remove("hidden");
  $("live-tekst").innerHTML = '<span style="color:#A8C8AC;font-style:italic">Luisteren...</span>';

  timerSecs = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timerSecs++;
    $("timer").textContent = String(Math.floor(timerSecs/60)).padStart(2,"0")+":"+String(timerSecs%60).padStart(2,"0");
  }, 1000);

  recognition.onresult = function(e){
    let interim="", final="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final += e.results[i][0].transcript+" ";
      else interim += e.results[i][0].transcript;
    }
    fullTranscript += final;
    $("live-tekst").innerHTML = `<span style="color:#1C2B20">${fullTranscript}</span><span style="color:#A8C8AC">${interim}</span>`;
  };

  recognition.onerror = function(e){
    if(e.error==="not-allowed"){
      showError("Microfoon geweigerd. Ga in Safari naar AA → Website-instellingen → Microfoon → Toestaan.");
    } else if(e.error!=="no-speech"){
      showError("Fout: "+e.error);
    }
    stopLuisteren();
  };

  recognition.onend = function(){
    if(isListening) try{ recognition.start(); }catch(e){}
  };

  recognition.start();
}

function stopLuisteren(){
  isListening = false;
  if(recognition){ try{ recognition.abort(); }catch(e){} recognition=null; }
  clearInterval(timerInterval);

  $("mic-btn").className = "mic-btn idle";
  $("mic-btn").textContent = "🎙️";
  $("mic-hint").textContent = "🎙 Tik om opnieuw op te nemen";
  $("timer-row").classList.add("hidden");

  // Pak tekst uit live element
  const liveEl = $("live-tekst");
  const tekst = fullTranscript.trim() || (liveEl ? liveEl.innerText.replace("Luisteren...","").trim() : "");

  // Verwerk antwoord per vraagtype
  let verwerkt = tekst;
  if(currentVraagId === "nummer") verwerkt = verwerkNummer(tekst);
  if(currentVraagId === "score") verwerkt = verwerkScore(tekst);

  // Toon review
  $("review-input").value = verwerkt;
  $("review-card").classList.remove("hidden");
  setTimeout(()=>$("review-card").scrollIntoView({behavior:"smooth",block:"start"}), 100);
}

function verwerkNummer(tekst){
  const cijferMap = {"nul":"0","één":"1","een":"1","twee":"2","drie":"3","vier":"4","vijf":"5","zes":"6","zeven":"7","acht":"8","negen":"9"};
  let t = tekst.toLowerCase();
  Object.entries(cijferMap).forEach(([w,c])=>{ t = t.replace(new RegExp("\\b"+w+"\\b","g")," "+c+" "); });
  const m = t.match(/[\d\s]{2,15}/);
  return m ? m[0].replace(/\s+/g,"").trim() : tekst;
}

function verwerkScore(tekst){
  const cijferMap = {"nul":"0","één":"1","een":"1","twee":"2","drie":"3","vier":"4","vijf":"5","zes":"6","zeven":"7","acht":"8","negen":"9","tien":"10"};
  let t = tekst.toLowerCase();
  Object.entries(cijferMap).forEach(([w,c])=>{ t = t.replace(new RegExp("\\b"+w+"\\b","g")," "+c+" "); });
  const m = t.match(/\b([1-9]|10)\b/);
  return m ? m[0] : tekst;
}

function bevestigAntwoord(){
  const antwoord = $("review-input").value.trim();
  if(!antwoord){ showError("Antwoord is leeg. Probeer opnieuw."); return; }

  S.antwoorden[currentVraagId] = antwoord;

  // Naar volgende vraag
  toonVraag(S.vraagIdx + 1);
}

// ── Verslag ──────────────────────────────────────────────────────
function toonVerslag(){
  $("progress-fill").style.width = "100%";
  renderStepBar(VRAGEN.length);
  $("interview-screen").classList.add("hidden");
  $("verslag-screen").classList.remove("hidden");

  const a = S.antwoorden;
  const score = parseInt(a.score) || 0;
  const scoreKleur = score >= 8 ? "#2D8045" : score >= 6 ? "#E67E22" : "#C0392B";
  const scoreEmoji = score >= 8 ? "😊" : score >= 6 ? "😐" : "😟";

  $("verslag-screen").innerHTML = `
    <div class="card" style="background:linear-gradient(135deg,#1F5C30,#2D8045);border:none;padding:20px 20px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:24px">🏢</div>
        <div>
          <p style="font-weight:800;font-size:18px;color:#fff;margin-bottom:3px">${a.naam||"—"}</p>
          <p style="font-size:13px;color:rgba(255,255,255,0.75);margin:0">Nr. ${a.nummer||"—"} · 📅 ${S.datum}</p>
        </div>
      </div>
    </div>

    <div class="card">
      <span class="label">💬 Samenvatting bezoek</span>
      <p style="color:#1C2B20;font-size:14px;margin:0;line-height:1.75">${a.samenvatting||"—"}</p>
    </div>

    <div class="card">
      <span class="label">🤝 Gemaakte afspraken</span>
      <p style="color:#1C2B20;font-size:14px;margin:0;line-height:1.75;white-space:pre-wrap">${a.afspraken||"—"}</p>
    </div>

    <div class="card" style="text-align:center">
      <span class="label">⭐ Klanttevredenheid</span>
      <div class="score-display" style="color:${scoreKleur}">${a.score||"—"}</div>
      <p style="color:${scoreKleur};font-size:22px;margin:0">${scoreEmoji}</p>
      <p style="color:#6B8F72;font-size:12px;margin-top:4px">op een schaal van 1 tot 10</p>
    </div>

    <div class="card">
      <span class="label">📤 Delen</span>
      <button class="btn-primary" onclick="mailVerslag()" style="margin-bottom:10px">📧 Mail verslag naar mezelf</button>
      <button class="btn-secondary" onclick="downloadICS()" style="margin-bottom:10px">📅 Download agenda-item (.ics)</button>
      <button class="btn-secondary" onclick="resetApp()">+ Nieuw bezoek starten</button>
    </div>
  `;
}

function mailVerslag(){
  const a = S.antwoorden;
  const subject = encodeURIComponent(`Bezoekverslag ${a.naam||""} (${a.nummer||""}) — ${S.datum}`);
  const body = encodeURIComponent(
    `BEZOEKVERSLAG\n` +
    `==============\n` +
    `Klant:   ${a.naam||"—"}\n` +
    `Nummer:  ${a.nummer||"—"}\n` +
    `Datum:   ${S.datum}\n\n` +
    `SAMENVATTING\n${a.samenvatting||"—"}\n\n` +
    `AFSPRAKEN\n${a.afspraken||"—"}\n\n` +
    `KLANTTEVREDENHEID: ${a.score||"—"}/10`
  );
  window.location.href = `mailto:${FIXED_EMAIL}?subject=${subject}&body=${body}`;
}

function downloadICS(){
  const a = S.antwoorden;
  const d = S.datum.replace(/-/g,"");
  const desc = `Samenvatting: ${a.samenvatting||""}\\nAfspraken: ${a.afspraken||""}\\nScore: ${a.score||""}/10`;
  const ics = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
    `SUMMARY:Bezoek ${a.naam||""} (${a.nummer||""})`,
    `DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`,`DESCRIPTION:${desc}`,
    "END:VEVENT","END:VCALENDAR"].join("\r\n");
  const el = document.createElement("a");
  el.href = URL.createObjectURL(new Blob([ics],{type:"text/calendar;charset=utf-8"}));
  el.download = `bezoek-${(a.naam||"klant").replace(/\s+/g,"-")}-${S.datum}.ics`;
  el.click();
}

function resetApp(){
  S = { vraagIdx:0, antwoorden:{}, datum:new Date().toISOString().split("T")[0] };
  $("verslag-screen").classList.add("hidden");
  $("verslag-screen").innerHTML = "";
  $("interview-screen").classList.remove("hidden");
  $("review-card").classList.add("hidden");
  $("live-tekst").classList.add("hidden");
  $("timer-row").classList.add("hidden");
  hideError();
  fullTranscript=""; isListening=false;
  $("start-screen").classList.remove("hidden");
  $("interview-screen").classList.add("hidden");
  renderStepBar(0);
}

// ── Start ────────────────────────────────────────────────────────
function startInterview(){
  $("start-screen").classList.add("hidden");
  $("interview-screen").classList.remove("hidden");
  renderStepBar(0);
  toonVraag(0);
}

renderStepBar(0);
</script>
