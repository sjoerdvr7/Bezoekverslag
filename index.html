<!DOCTYPE html>

<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Bezoekverslag"/>
  <title>Sligro Bezoekverslag</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    body{background:#F0FAF3;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
    button,input,textarea{font-family:inherit}
    @keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.4),0 0 0 6px rgba(192,57,43,0.1)}50%{box-shadow:0 0 0 12px rgba(192,57,43,0.2),0 0 0 24px rgba(192,57,43,0.05)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .card{background:#fff;border:1px solid #C8E5CC;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(61,170,92,0.06);animation:fadeIn 0.3s ease}
    .label{color:#3DAA5C;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:block}
    .btn-primary{padding:15px 20px;border-radius:12px;width:100%;border:none;background:linear-gradient(135deg,#3DAA5C,#2D8045);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(61,170,92,0.3);touch-action:manipulation;display:block}
    .btn-secondary{padding:13px 20px;border-radius:12px;width:100%;background:#fff;border:1.5px solid #C8E5CC;color:#2E4A35;font-size:15px;font-weight:600;cursor:pointer;touch-action:manipulation;display:block}
    .mic-btn{width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;font-size:36px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;transition:all 0.25s}
    .mic-btn.idle{background:linear-gradient(135deg,#3DAA5C,#2D8045);box-shadow:0 0 0 6px #D4EFD9,0 6px 24px rgba(61,170,92,0.25)}
    .mic-btn.recording{background:linear-gradient(135deg,#C0392B,#922b21);box-shadow:0 0 0 8px rgba(192,57,43,0.15),0 6px 24px rgba(192,57,43,0.3);animation:mic-pulse 1.8s ease-in-out infinite}
    .rec-dot{width:9px;height:9px;border-radius:50%;background:#C0392B;animation:blink 1s ease-in-out infinite;flex-shrink:0}
    .hidden{display:none!important}
    .live-box{background:#F0FAF3;border:1.5px solid #C8E5CC;border-radius:10px;padding:14px;min-height:80px;font-size:15px;color:#1C2B20;line-height:1.7;margin-top:16px;width:100%;word-break:break-word;text-align:left}
    .textarea-field{width:100%;padding:12px 14px;background:#fff;border:1.5px solid #C8E5CC;border-radius:10px;color:#1C2B20;font-size:15px;outline:none;-webkit-appearance:none;resize:vertical;line-height:1.6}
    .progress-bar{height:4px;background:#D4EFD9;border-radius:2px;margin-bottom:24px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#3DAA5C,#2D8045);border-radius:2px;transition:width 0.4s ease}
    .score-big{font-size:64px;font-weight:900;text-align:center;margin:8px 0}
    .badge-deadline{background:#D4EFD9;color:#1F5C30;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
  </style>
</head>
<body>

<div style="background:linear-gradient(135deg,#1F5C30,#3DAA5C);padding:0 16px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(31,92,48,0.25)">

<div style="max-width:520px;margin:0 auto;padding:20px 16px 80px">

    </div>

        <span style="width:28px;height:28px;border-radius:50%;background:#3DAA5C;color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">2</span>

        <span style="color:#2E4A35;font-size:15px;font-weight:600">💬 Samenvatting bezoek</span>
      </div>
      <div style="display:flex;align-items:center;gap:14px;background:#E3F5E9;border-radius:12px;padding:12px 16px">
        <span style="width:28px;height:28px;border-radius:50%;background:#3DAA5C;color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">4</span>
        <span style="color:#2E4A35;font-size:15px;font-weight:600">🤝 Gemaakte afspraken</span>

      <div style="display:flex;align-items:center;gap:14px;background:#E3F5E9;border-radius:12px;padding:12px 16px">
        <span style="width:28px;height:28px;border-radius:50%;background:#3DAA5C;color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">5</span>
        <span style="color:#2E4A35;font-size:15px;font-weight:600">⭐ Tevredenheidscijfer</span>

    <button class="btn-primary" onclick="startInterview()">🎙️ Leg je klantbezoek nu vast!</button>
  </div>

  <!-- INTERVIEW SCHERM -->

  <div id="interview-screen" class="hidden">
    <div class="card" style="padding:24px 20px">

  <div id="vraag-bubble" style="background:#E3F5E9;border-radius:14px;padding:18px 20px;margin-bottom:24px">

<script>
const FIXED_EMAIL = "svanreijmersdal@sligro.nl";

const VRAGEN = [
  {
    id: "nummer",
    icon: "🔢",
    label: "NR.",
    vraag: "Wat is het klantnummer?",
    hint: "Spreek alleen het klantnummer in, bijv: 'Twaalf drie vier vijf zes'"
  },
  {
    id: "naam",
    icon: "🏢",
    label: "NAAM",
    vraag: "Wat is de naam van de klant?",
    hint: "Spreek de volledige bedrijfsnaam in"
  },
  {
    id: "samenvatting",
    icon: "💬",
    label: "VERSLAG",
    vraag: "Geef een samenvatting van je bezoek.",
    hint: "Wat was de aanleiding? Hoe verliep het gesprek? Wat zijn de belangrijkste punten?"
  },
  {
    id: "afspraken",
    icon: "🤝",
    label: "AFSPRAKEN",
    vraag: "Welke afspraken zijn er gemaakt?",
    hint: "Noem alle concrete afspraken, acties en wie wat oppakt"
  },
  {
    id: "score",
    icon: "⭐",
    label: "SCORE",
    vraag: "Hoe tevreden is de klant? Geef een cijfer van 1 tot 10.",
    hint: "Spreek alleen het cijfer in, bijv: 'Acht'"
  }
];

let S = { vraagIdx: 0, antwoorden: {}, datum: new Date().toISOString().split("T")[0] };
let recognition = null;
let isListening = false;
let fullTranscript = "";
let timerInterval = null;
let timerSecs = 0;

function $(id){ return document.getElementById(id); }
function showError(m){ $("error-text").textContent=m; $("error-banner").classList.remove("hidden"); }
function hideError(){ $("error-banner").classList.add("hidden"); }

// ── Stepbar ──────────────────────────────────────────────────────
function renderStepBar(current){
  const bar = $("stepbar"); bar.innerHTML = "";
  VRAGEN.forEach((v, i) => {
    const done = i < current, active = i === current;
    const wrap = document.createElement("div");
    wrap.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0";
    wrap.innerHTML = `
      <div style="width:32px;height:32px;border-radius:50%;
        background:${done?"#3DAA5C":active?"#fff":"#E3F5E9"};
        border:2.5px solid ${done||active?"#3DAA5C":"#C8E5CC"};
        box-shadow:${active?"0 0 0 4px #D4EFD9":"none"};
        display:flex;align-items:center;justify-content:center;font-size:${done?12:15}px">
        ${done?"✓":"<span>"+v.icon+"</span>"}
      </div>
      <span style="font-size:8px;font-weight:${active?700:500};color:${active?"#3DAA5C":"#A8C8AC"};white-space:nowrap">${v.label}</span>`;
    bar.appendChild(wrap);
    if(i < VRAGEN.length - 1){
      const line = document.createElement("div");
      line.style.cssText = `flex:1;height:2.5px;background:${done?"#3DAA5C":"#C8E5CC"};margin:0 4px;margin-bottom:18px;border-radius:2px;min-width:6px`;
      bar.appendChild(line);
    }
  });
  $("progress-fill").style.width = (current / VRAGEN.length * 100) + "%";
}

// ── Start ────────────────────────────────────────────────────────
function startInterview(){
  $("start-screen").classList.add("hidden");
  $("interview-screen").classList.remove("hidden");
  toonVraag(0);
}

function toonVraag(idx){
  if(idx >= VRAGEN.length){ toonVerslag(); return; }
  S.vraagIdx = idx;
  const v = VRAGEN[idx];
  renderStepBar(idx);

  $("vraag-tekst").textContent = v.vraag;
  $("vraag-hint").textContent = v.hint;
  $("review-card").classList.add("hidden");
  $("live-box").classList.add("hidden");
  $("live-box").innerHTML = "";
  $("timer-row").classList.add("hidden");
  $("mic-btn").className = "mic-btn idle";
  $("mic-btn").textContent = "🎙️";
  $("mic-hint").textContent = "🎙 Tik om te beginnen";
  fullTranscript = "";
  isListening = false;
  clearInterval(timerInterval);
}

// ── Opname ───────────────────────────────────────────────────────
function toggleLuisteren(){
  if(isListening){ stopLuisteren(); return; }

  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    showError("Spraakherkenning niet beschikbaar. Gebruik Safari op iPhone.");
    return;
  }

  fullTranscript = "";
  isListening = true;
  $("mic-btn").className = "mic-btn recording";
  $("mic-btn").textContent = "⏹️";
  $("mic-hint").textContent = "⏹ Tik om te stoppen";
  $("timer-row").classList.remove("hidden");
  $("live-box").classList.remove("hidden");
  $("live-box").innerHTML = "<span style='color:#A8C8AC;font-style:italic'>Luisteren...</span>";

  timerSecs = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timerSecs++;
    $("timer").textContent = String(Math.floor(timerSecs/60)).padStart(2,"0")+":"+String(timerSecs%60).padStart(2,"0");
  }, 1000);

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "nl-NL";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = function(e){
    let final = "", interim = "";
    for(let i = e.resultIndex; i < e.results.length; i++){
      if(e.results[i].isFinal) final += e.results[i][0].transcript + " ";
      else interim += e.results[i][0].transcript;
    }
    fullTranscript += final;
    $("live-box").innerHTML =
      "<span style='color:#1C2B20'>" + fullTranscript + "</span>" +
      "<span style='color:#A8C8AC'>" + interim + "</span>";
  };

  recognition.onerror = function(e){
    if(e.error === "not-allowed"){
      showError("Microfoon geweigerd. Ga in Safari naar AA → Website-instellingen → Microfoon → Toestaan.");
    } else if(e.error !== "no-speech"){
      showError("Fout: " + e.error);
    }
    stopLuisteren();
  };

  recognition.onend = function(){
    if(isListening) try{ recognition.start(); }catch(e){}
  };

  recognition.start();
}

function stopLuisteren(){
  isListening = false;
  if(recognition){ try{ recognition.abort(); }catch(e){} recognition = null; }
  clearInterval(timerInterval);
  $("mic-btn").className = "mic-btn idle";
  $("mic-btn").textContent = "🎙️";
  $("mic-hint").textContent = "🎙 Tik om opnieuw op te nemen";
  $("timer-row").classList.add("hidden");

  // Haal tekst op en verwerk per vraagtype
  const liveEl = $("live-box");
  let tekst = fullTranscript.trim() || (liveEl ? liveEl.innerText.replace("Luisteren...","").trim() : "");

  if(VRAGEN[S.vraagIdx].id === "nummer") tekst = verwerkNummer(tekst);
  if(VRAGEN[S.vraagIdx].id === "score")  tekst = verwerkScore(tekst);

  $("review-input").value = tekst;
  $("review-card").classList.remove("hidden");
  setTimeout(()=>{ $("review-card").scrollIntoView({behavior:"smooth",block:"start"}); }, 100);
}

function verwerkNummer(tekst){
  const map = {"nul":"0","één":"1","een":"1","twee":"2","drie":"3","vier":"4","vijf":"5","zes":"6","zeven":"7","acht":"8","negen":"9"};
  let t = tekst.toLowerCase();
  Object.entries(map).forEach(([w,c])=>{ t = t.replace(new RegExp("\\b"+w+"\\b","g")," "+c+" "); });
  const m = t.match(/[\d\s]{2,15}/);
  return m ? m[0].replace(/\s+/g,"").trim() : tekst;
}

function verwerkScore(tekst){
  const map = {"nul":"0","één":"1","een":"1","twee":"2","drie":"3","vier":"4","vijf":"5","zes":"6","zeven":"7","acht":"8","negen":"9","tien":"10"};
  let t = tekst.toLowerCase();
  Object.entries(map).forEach(([w,c])=>{ t = t.replace(new RegExp("\\b"+w+"\\b","g")," "+c+" "); });
  const m = t.match(/\b([1-9]|10)\b/);
  return m ? m[0] : tekst;
}

function bevestigAntwoord(){
  const antwoord = $("review-input").value.trim();
  if(!antwoord){ showError("Antwoord is leeg. Probeer opnieuw."); return; }
  S.antwoorden[VRAGEN[S.vraagIdx].id] = antwoord;
  toonVraag(S.vraagIdx + 1);
}

// ── Verslag ──────────────────────────────────────────────────────
function toonVerslag(){
  renderStepBar(VRAGEN.length);
  $("progress-fill").style.width = "100%";
  $("interview-screen").classList.add("hidden");
  $("verslag-screen").classList.remove("hidden");

  const a = S.antwoorden;
  const score = parseInt(a.score) || 0;
  const scoreKleur = score >= 8 ? "#2D8045" : score >= 6 ? "#E67E22" : "#C0392B";
  const scoreEmoji = score >= 8 ? "😊" : score >= 6 ? "😐" : "😟";

  $("verslag-screen").innerHTML = `
    <div class="card" style="background:linear-gradient(135deg,#1F5C30,#2D8045);border:none;padding:20px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:24px">🏢</div>
        <div>
          <p style="font-weight:800;font-size:18px;color:#fff;margin-bottom:3px">${a.naam||"—"}</p>
          <p style="font-size:13px;color:rgba(255,255,255,0.75);margin:0">Nr. ${a.nummer||"—"} · 📅 ${S.datum}</p>
        </div>
      </div>
    </div>

    <div class="card">
      <span class="label">💬 Samenvatting bezoek</span>
      <p style="color:#1C2B20;font-size:14px;margin:0;line-height:1.75;white-space:pre-wrap">${a.samenvatting||"—"}</p>
    </div>

    <div class="card">
      <span class="label">🤝 Gemaakte afspraken</span>
      <p style="color:#1C2B20;font-size:14px;margin:0;line-height:1.75;white-space:pre-wrap">${a.afspraken||"—"}</p>
    </div>

    <div class="card" style="text-align:center">
      <span class="label">⭐ Klanttevredenheid</span>
      <div class="score-big" style="color:${scoreKleur}">${a.score||"—"}</div>
      <p style="font-size:24px;margin:0">${scoreEmoji}</p>
      <p style="color:#6B8F72;font-size:12px;margin-top:6px">op een schaal van 1 tot 10</p>
    </div>

    <div class="card">
      <span class="label">📤 Delen</span>
      <button class="btn-primary" onclick="mailVerslag()" style="margin-bottom:10px">📧 Mail verslag naar mezelf</button>
      <button class="btn-secondary" onclick="downloadICS()" style="margin-bottom:10px">📅 Download agenda-item (.ics)</button>
      <button class="btn-secondary" onclick="resetApp()">+ Nieuw bezoek starten</button>
    </div>
  `;
}

function mailVerslag(){
  const a = S.antwoorden;
  const subject = encodeURIComponent(`Bezoekverslag ${a.naam||""} (${a.nummer||""}) — ${S.datum}`);
  const body = encodeURIComponent(
    `BEZOEKVERSLAG\n==============\n` +
    `Klant:  ${a.naam||"—"}\n` +
    `Nr:     ${a.nummer||"—"}\n` +
    `Datum:  ${S.datum}\n\n` +
    `SAMENVATTING\n${a.samenvatting||"—"}\n\n` +
    `AFSPRAKEN\n${a.afspraken||"—"}\n\n` +
    `KLANTTEVREDENHEID: ${a.score||"—"}/10`
  );
  window.location.href = `mailto:${FIXED_EMAIL}?subject=${subject}&body=${body}`;
}

function downloadICS(){
  const a = S.antwoorden;
  const d = S.datum.replace(/-/g,"");
  const desc = `Samenvatting: ${a.samenvatting||""}\\nAfspraken: ${a.afspraken||""}\\nScore: ${a.score||""}/10`;
  const ics = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
    `SUMMARY:Bezoek ${a.naam||""} (${a.nummer||""})`,
    `DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`,`DESCRIPTION:${desc}`,
    "END:VEVENT","END:VCALENDAR"].join("\r\n");
  const el = document.createElement("a");
  el.href = URL.createObjectURL(new Blob([ics],{type:"text/calendar;charset=utf-8"}));
  el.download = `bezoek-${(a.naam||"klant").replace(/\s+/g,"-")}-${S.datum}.ics`;
  el.click();
}

function resetApp(){
